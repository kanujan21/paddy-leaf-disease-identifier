<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 Paddy Leaf Disease Identifier - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Fallback if not using Flask -->
    <link rel="stylesheet" href="../static/style.css">
    <script src="{{ url_for('static', filename='translations.js') }}" defer></script>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="nav-bar">
        <a href="{{ url_for('home') if url_for is defined else 'home.html' }}" data-i18n="home">Home</a>
        <a href="{{ url_for('upload_page') if url_for is defined else 'upload.html' }}" data-i18n="upload">Upload</a>
        <a href="{{ url_for('about_page') if url_for is defined else 'about.html' }}" data-i18n="about">About</a>
        <a href="{{ url_for('history_page') if url_for is defined else 'history.html' }}"
            data-i18n="history">History</a>
    </div>

    <div class="hero">
        <div
            style="position: relative; width: 100vw; height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 40px;">
            <img src="{{ url_for('static', filename='images/paddy_hero.png') }}"
                style="position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6);">
            <div style="position: relative; z-index: 1; text-align: center; padding: 20px;">
                <h1 data-i18n="hero_title">🌾 Paddy Leaf Disease Identifier</h1>
                <p data-i18n="hero_subtitle"
                    style="max-width: 800px; margin: 0 auto; color: var(--accent); font-size: 1.3rem; line-height: 1.6; font-weight: 700;">
                </p>
            </div>
        </div>
    </div>

    <div class="glass-card" style="margin-top: -80px; position: relative; z-index: 10;">
        <div style="display: flex; gap: 40px; align-items: center; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <h2 data-i18n="ready_check" style="color: var(--primary); margin-top: 0;">Ready to check your crop?</h2>
                <p data-i18n="how_to_use" style="opacity: 0.9; margin-bottom: 30px;">Simply upload an image of a paddy
                    leaf, and the app will predict the disease with a confidence score and provide actionable solutions.
                </p>
                <a href="{{ url_for('upload_page') if url_for is defined else 'upload.html' }}" class="btn"
                    data-i18n="get_started">Get Started Now</a>
            </div>
            <div
                style="flex: 1; min-width: 300px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <img src="{{ url_for('static', filename='images/paddy_diseases.png') }}" alt="Paddy Diseases"
                    style="width: 100%; display: block;">
            </div>
        </div>
    </div>

    <div style="margin-bottom: 50px; text-align: center; opacity: 0.7; font-size: 0.9rem;">
        &copy; 2024 <span data-i18n="footer_copy">Paddy Leaf Disease Identifier. All rights reserved.</span>
    </div>

</body>

</html>
