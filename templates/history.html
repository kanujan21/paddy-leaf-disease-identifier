<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 Prediction History - Paddy Disease Identifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="../static/style.css">
    <script src="{{ url_for('static', filename='translations.js') }}" defer></script>
    <style>
        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 25px;
            align-items: flex-start;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }

        .history-item:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.08);
        }

        .history-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }

        .history-info {
            flex: 1;
        }

        .history-info strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-info p {
            margin: 0 0 15px 0;
            font-size: 1rem;
            line-height: 1.4;
        }

        .btn-clear {
            background: #e74c3c;
            margin-top: 0;
        }

        .btn-clear:hover {
            background: #c0392b;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        .btn-delete-item {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            height: fit-content;
        }

        .btn-delete-item:hover {
            background: #e74c3c;
            color: white;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="nav-bar">
        <a href="{{ url_for('home') if url_for is defined else 'home.html' }}" data-i18n="home">Home</a>
        <a href="{{ url_for('upload_page') if url_for is defined else 'upload.html' }}" data-i18n="upload">Upload</a>
        <a href="{{ url_for('about_page') if url_for is defined else 'about.html' }}" data-i18n="about">About</a>
        <a href="{{ url_for('history_page') if url_for is defined else 'history.html' }}"
            data-i18n="history">History</a>
    </div>

    <div class="hero">
        <h1 data-i18n="history_title">🌾 Prediction History</h1>
    </div>

    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3 data-i18n="recent_idents" style="margin: 0; color: var(--text-white);">Recent Identifications</h3>
            <button class="btn btn-clear" onclick="clearHistory()" data-i18n="clear_history_btn">Clear All
                History</button>
        </div>

        <div id="historyContainer">
            <p data-i18n="loading_history" style="text-align: center; opacity: 0.6;">Loading history...</p>
        </div>
    </div>

    <div style="margin-bottom: 50px; text-align: center; opacity: 0.7; font-size: 0.9rem;">
        &copy; 2024 <span data-i18n="title">Paddy Leaf Disease Identifier</span>.
    </div>

    <script>
        function fetchHistory() {
            const lang = localStorage.getItem('selectedLanguage') || 'en';
            const t = translations[lang];

            fetch('/history')
                .then(response => {
                    if (!response.ok) throw new Error("Could not fetch history");
                    return response.json();
                })
                .then(data => {
                    const historyContainer = document.getElementById('historyContainer');
                    if (!data.history || data.history.length === 0) {
                        historyContainer.innerHTML = `<p style="text-align: center; padding: 40px; opacity: 0.5;">${t.no_history}</p>`;
                        return;
                    }

                    historyContainer.innerHTML = '';

                    data.history.forEach(item => {
                        const historyItem = document.createElement('div');
                        historyItem.classList.add('history-item');
                        historyItem.innerHTML = `
                        <img class="history-img" src="data:image/jpeg;base64,${item.image}" alt="Predicted Leaf">
                        <div class="history-info">
                            <strong>${t.disease_prediction}</strong>
                            <p style="font-size: 1.2rem; font-weight: 600;">${translateResult(item.prediction)}</p>
                            
                            <strong>${t.confidence_level}</strong>
                            <p style="color: var(--primary); font-weight: 600;">${item.confidence}</p>
                            
                            <strong>${t.recommended_treatment}</strong>
                            <p style="opacity: 0.9; font-size: 0.95rem;">${translateResult(item.prediction, 'solution')}</p>
                        </div>
                        <button class="btn-delete-item" onclick="deleteHistoryItem(${item.id})">🗑️</button>
                    `;
                        historyContainer.appendChild(historyItem);
                    });
                })
                .catch(error => {
                    document.getElementById('historyContainer').innerHTML = `<p style="color: #ff6b6b; text-align: center;">Error: ${error.message}</p>`;
                });
        }

        function deleteHistoryItem(id) {
            const lang = localStorage.getItem('selectedLanguage') || 'en';
            const confirmMsg = lang === 'ta' ? 'இந்த பதிவை நீக்க விரும்புகிறீர்களா?' : (lang === 'si' ? 'ඔබට මෙම වාර්තාව මැකීමට අවශ්‍යද?' : "Are you sure you want to delete this record?");

            if (!confirm(confirmMsg)) return;

            fetch(`/delete_history/${id}`, {
                method: 'POST'
            })
                .then(response => {
                    if (response.ok) {
                        fetchHistory(); // Refresh list
                    } else {
                        alert('Failed to delete item');
                    }
                })
                .catch(err => alert('Error: ' + err));
        }

        function clearHistory() {
            const lang = localStorage.getItem('selectedLanguage') || 'en';
            const confirmMsg = lang === 'ta' ? 'அனைத்து வரலாற்றுப் பதிவுகளையும் அழிக்க விரும்புகிறீர்களா?' : (lang === 'si' ? 'ඔබට සියලු දත්ත මැකීමට අවශ්‍ය බව සහතිකද?' : "Are you sure you want to clear all history records?");

            if (!confirm(confirmMsg)) return;

            fetch('/clear_history', {
                method: 'POST',
            })
                .then(response => response.json())
                .then(data => {
                    fetchHistory();
                })
                .catch(error => {
                    console.error('Error clearing history:', error);
                });
        }

        window.onload = fetchHistory;
    </script>

</body>

</html>
